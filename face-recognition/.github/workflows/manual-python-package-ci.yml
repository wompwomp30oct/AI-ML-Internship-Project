name: Manual Python Package CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-package:
    name: Build package / macOS / Python 3.11
    runs-on: macos-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: bash
        working-directory: python-package

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      PIP_NO_CACHE_DIR: "1"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine

      - name: Build wheel and source distribution
        run: |
          rm -rf dist build *.egg-info
          python -m build

      - name: Check package metadata
        run: |
          python -m twine check dist/*

      - name: Inspect built package contents
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile
          from zipfile import ZipFile

          wheels = sorted(Path("dist").glob("insightface-1.0.1-*.whl"))
          sdists = sorted(Path("dist").glob("insightface-1.0.1.tar.gz"))
          assert wheels, "No wheel was built."
          assert sdists, "No source distribution was built."
          wheel_path = wheels[-1]
          sdist_path = sdists[-1]

          with ZipFile(wheel_path) as archive:
              names = archive.namelist()
              wheel_metadata = archive.read("insightface-1.0.1.dist-info/WHEEL").decode()
              package_metadata = archive.read("insightface-1.0.1.dist-info/METADATA").decode()
          with tarfile.open(sdist_path, "r:gz") as archive:
              sdist_names = archive.getnames()

          assert "Root-Is-Purelib: true" in wheel_metadata
          assert "Tag: py3-none-any" in wheel_metadata
          assert "Requires-Dist: onnxruntime" in package_metadata
          assert "Requires-Dist: opencv-python" in package_metadata
          assert "Provides-Extra: gui" in package_metadata
          assert "Requires-Dist: PySide6-Essentials" in package_metadata
          assert "Requires-Dist: reportlab" in package_metadata
          assert "Requires-Dist: scikit-learn" in package_metadata
          assert "Provides-Extra: face3d" in package_metadata
          assert "Requires-Dist: matplotlib" in package_metadata
          assert "Requires-Dist: pandas" not in package_metadata
          assert "Requires-Dist: easydict" not in package_metadata
          assert "Requires-Dist: prettytable" not in package_metadata
          assert "License: MIT" not in package_metadata
          assert "Requires-Dist: PySide6 " not in package_metadata
          assert "insightface/data/images/t1.jpg" in names
          assert "insightface/data/objects/meanshape_68.pkl" in names
          assert "insightface/gui/assets/app_icon.png" in names
          assert "insightface/gui/assets/app_icon.ico" in names
          assert "insightface/gui/assets/app_icon.icns" in names
          assert any(name.endswith("insightface/gui/assets/app_icon.png") for name in sdist_names)
          assert any(name.endswith("insightface/gui/assets/app_icon.ico") for name in sdist_names)
          assert any(name.endswith("insightface/gui/assets/app_icon.icns") for name in sdist_names)
          assert not any(".data/data/insightface/data/" in name for name in names)
          assert not any(name.endswith((".so", ".pyd", ".dll", ".dylib")) for name in names)

          print(f"Package inspection passed: {wheel_path}, {sdist_path}")
          PY

      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-package-dist
          path: python-package/dist/*

  install-test:
    name: Install test / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: build-package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"

    defaults:
      run:
        shell: bash
        working-directory: python-package

    env:
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      PIP_NO_CACHE_DIR: "1"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux GUI runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0
        working-directory: .

      - name: Download macOS-built package artifacts
        uses: actions/download-artifact@v5
        with:
          name: python-package-dist
          path: python-package/dist

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip setuptools wheel pytest

      - name: Install built wheel with GUI extra
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          wheels = sorted(Path("dist").glob("insightface-1.0.1-*.whl"))
          assert wheels, "No wheel artifact was downloaded."
          wheel = wheels[-1]
          subprocess.check_call([sys.executable, "-m", "pip", "install", f"{wheel}[gui]"])
          print(f"Installed package artifact: {wheel}")
          PY

      - name: Check PySide6 Essentials platform plugins
        run: |
          python - <<'PY'
          import os
          import sys
          from importlib import metadata
          from pathlib import Path

          assert metadata.version("PySide6-Essentials")
          assert metadata.version("shiboken6")
          for dist_name in ("PySide6", "PySide6-Addons"):
              try:
                  version = metadata.version(dist_name)
              except metadata.PackageNotFoundError:
                  continue
              raise AssertionError(f"{dist_name} should not be installed in the GUI extra, found {version}")

          from insightface.gui.app import configure_qt_plugin_paths, qt_plugin_root_candidates

          os.environ.pop("QT_PLUGIN_PATH", None)
          os.environ.pop("QT_QPA_PLATFORM_PLUGIN_PATH", None)
          configure_qt_plugin_paths()

          if not os.environ.get("QT_PLUGIN_PATH") or not os.environ.get("QT_QPA_PLATFORM_PLUGIN_PATH"):
              raise AssertionError(
                  "Qt plugin paths were not configured. "
                  f"Candidates: {[str(path) for path in qt_plugin_root_candidates()]}"
              )

          plugin_root = Path(os.environ["QT_PLUGIN_PATH"])
          platform_dir = Path(os.environ["QT_QPA_PLATFORM_PLUGIN_PATH"])
          if sys.platform == "darwin":
              expected = {"libqcocoa.dylib", "libqoffscreen.dylib"}
          elif sys.platform.startswith("win"):
              expected = {"qwindows.dll", "qoffscreen.dll"}
          elif sys.platform.startswith("linux"):
              expected = {"libqxcb.so", "libqoffscreen.so"}
          else:
              expected = set()

          available = {path.name for path in platform_dir.iterdir()}
          missing = expected - available
          assert plugin_root.exists(), plugin_root
          assert platform_dir.exists(), platform_dir
          assert not missing, f"Missing Qt platform plugins: {sorted(missing)} in {platform_dir}"

          print(f"PySide6 Essentials Qt plugin root: {plugin_root}")
          print(f"Available platform plugins: {sorted(available)}")
          PY

      - name: Check installed dependencies
        run: |
          python -m pip check

      - name: Verify installed package and entry points
        run: |
          python - <<'PY'
          import subprocess
          import sys
          import tempfile

          checks = [
              [sys.executable, "-c", "import insightface, insightface.gui; assert insightface.__version__ == '1.0.1'; assert insightface.gui.__version__ == '1.0.1'"],
              [sys.executable, "-m", "insightface.gui", "--version"],
              ["insightface-gui", "--version"],
              ["insightface-eval-studio", "--version"],
              ["insightface-desktop", "--version"],
          ]
          with tempfile.TemporaryDirectory() as tmp:
              for command in checks:
                  output = subprocess.check_output(command, text=True, cwd=tmp)
                  if command[-1] == "--version":
                      assert "InsightFace Evaluation Studio 1.0.1" in output
                      assert "insightface 1.0.1" in output
          print("Installed package and console entry points verified.")
          PY

      - name: Copy GUI tests outside source tree
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          source = Path("tests/gui")
          target = Path(os.environ["RUNNER_TEMP"]) / "insightface-gui-tests"
          if target.exists():
              shutil.rmtree(target)
          shutil.copytree(source, target)
          print(f"Copied GUI tests to {target}")
          PY

      - name: Run GUI and packaging tests against installed wheel
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys
          from pathlib import Path

          test_dir = Path(os.environ["RUNNER_TEMP"]) / "insightface-gui-tests"
          subprocess.check_call([sys.executable, "-m", "pytest", str(test_dir), "-q"], cwd=str(test_dir.parent))
          PY

      - name: Run multilingual GUI tests against installed wheel
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys
          from pathlib import Path

          test_file = Path(os.environ["RUNNER_TEMP"]) / "insightface-gui-tests" / "test_i18n.py"
          subprocess.check_call([sys.executable, "-m", "pytest", str(test_file), "-q"], cwd=str(test_file.parent.parent))
          PY
